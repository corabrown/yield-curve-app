services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME:-yieldcurve}
      POSTGRES_USER: ${DB_USER:-yieldcurve}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localpassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-yieldcurve}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Migrations (runs once, then exits) ─────────────────────────────────────
  migrations:
    build:
      context: ./migrations
    command: >
      -url=jdbc:postgresql://postgres:5432/${DB_NAME:-yieldcurve}
      -user=${DB_USER:-yieldcurve}
      -password=${DB_PASSWORD:-localpassword}
      -connectRetries=10
      migrate
    depends_on:
      postgres:
        condition: service_healthy

  # ── Backfill (runs once on startup, then exits) ────────────────────────────
  backfill:
    build:
      context: ./services/pipeline
      target: prod
    command: python -m src.backfill
    environment:
      DATABASE_URL: postgresql://${DB_USER:-yieldcurve}:${DB_PASSWORD:-localpassword}@postgres:5432/${DB_NAME:-yieldcurve}
    depends_on:
      migrations:
        condition: service_completed_successfully

  # ── FastAPI ─────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./services/api
      target: prod
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-yieldcurve}:${DB_PASSWORD:-localpassword}@postgres:5432/${DB_NAME:-yieldcurve}
    depends_on:
      backfill:
        condition: service_completed_successfully

  # ── Streamlit frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./services/frontend
    ports:
      - "8501:8501"
    environment:
      API_URL: http://api:8000
    depends_on:
      - api

  # ── Pipeline (run on demand; scheduled via EventBridge on AWS) ─────────────
  pipeline:
    build:
      context: ./services/pipeline
      target: prod
    environment:
      DATABASE_URL: postgresql://${DB_USER:-yieldcurve}:${DB_PASSWORD:-localpassword}@postgres:5432/${DB_NAME:-yieldcurve}
    depends_on:
      migrations:
        condition: service_completed_successfully
    profiles:
      - pipeline

volumes:
  postgres_data:

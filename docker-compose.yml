services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME:-yieldcurve}
      POSTGRES_USER: ${DB_USER:-yieldcurve}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localpassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-yieldcurve}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Migrations (runs once, then exits) ─────────────────────────────────────
  migrations:
    image: flyway/flyway:10
    command: >
      -url=jdbc:postgresql://postgres:5432/${DB_NAME:-yieldcurve}
      -user=${DB_USER:-yieldcurve}
      -password=${DB_PASSWORD:-localpassword}
      -connectRetries=10
      migrate
    volumes:
      - ./migrations:/flyway/sql:ro
    depends_on:
      postgres:
        condition: service_healthy

  # ── Pipeline (run on demand; scheduled via EventBridge on AWS) ─────────────
  pipeline:
    build:
      context: ./services/pipeline
      target: dev
    environment:
      DATABASE_URL: postgresql://${DB_USER:-yieldcurve}:${DB_PASSWORD:-localpassword}@postgres:5432/${DB_NAME:-yieldcurve}
    volumes:
      - ./services/pipeline/src:/app/src  # live edits in dev
    depends_on:
      migrations:
        condition: service_completed_successfully
    profiles:
      - pipeline  # don't start automatically; run via: make run-pipeline

volumes:
  postgres_data:
